name: Scrape Lotto Data

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

# ADD THIS SECTION ▼
permissions:
  contents: write
# ------------------

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run Scraper
        run: node scrape.js

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/results.json
          git commit -m "Update lotto data [skip ci]" || echo "No changes to commit"
          git push
